name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Check formatting
        run: deno fmt --check deno.json src/ tests/ README.md

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check src/config_loader.ts tests/main_test.ts

      - name: Test
        run: deno test --allow-read --allow-write --allow-env
